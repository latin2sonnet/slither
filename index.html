<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Slither Clone - Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    #score {
      position: absolute; top: 10px; left: 10px; color: #fff; font-size: 18px;
      text-shadow: 0 1px 3px rgba(0,0,0,.7);
    }
    #leaderboard {
      position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.45);
      padding: 10px 14px; border-radius: 8px; color: #fff; min-width: 170px;
      font-size: 14px;
    }
    #leaderboard h3 { margin: 0 0 6px; font-size: 15px; color: #ddd; }
    #leaderboard ol { padding-left: 18px; line-height: 1.5; }
    #overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.65);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: auto; color: #fff; text-align: center;
      padding: 20px;
    }
    #overlay h1 { font-size: 56px; margin-bottom: 12px; color: #6be; text-shadow: 0 0 16px rgba(100,190,255,.6); }
    #overlay p { font-size: 16px; margin-bottom: 18px; color: #ccc; }
    #overlay input {
      font-size: 16px; padding: 10px 14px; border-radius: 8px; border: none;
      margin-bottom: 10px; width: 260px; max-width: 80vw; outline: none;
    }
    #overlay button {
      font-size: 20px; padding: 12px 34px; border-radius: 30px; border: none;
      background: linear-gradient(180deg,#6be,#28b); color: #fff; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,.4); transition: transform .1s;
    }
    #overlay button:hover { transform: scale(1.05); }
    #overlay button:disabled { background: #555; cursor: not-allowed; transform: none; }
    #status { margin-top: 12px; color: #ff9; font-size: 14px; min-height: 20px; }
    #lengthBar {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      width: 220px; height: 8px; background: rgba(255,255,255,.2); border-radius: 4px; overflow: hidden;
    }
    #lengthBarFill { height: 100%; width: 0%; background: #6be; transition: width .1s; }
    #controlsTip { position: absolute; bottom: 26px; width: 100%; text-align: center; color: rgba(255,255,255,.6); font-size: 13px; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="score">Length: 10</div>
  <div id="leaderboard">
    <h3>Leaderboard</h3>
    <ol id="lbList"></ol>
  </div>
  <div id="overlay">
    <h1>Slither Clone</h1>
    <p>Multiplayer prototype. Enter your name and server URL, then click Play.</p>
    <input id="nameInput" type="text" placeholder="Your name" value="Snake" maxlength="18">
    <input id="serverInput" type="text" placeholder="Server URL" value="http://localhost:3000">
    <button id="playBtn">Play</button>
    <div id="status"></div>
  </div>
  <div id="lengthBar"><div id="lengthBarFill"></div></div>
  <div id="controlsTip">Move mouse/finger to steer • Click / Space / hold to boost</div>
</div>
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  const overlay = document.getElementById('overlay');
  const playBtn = document.getElementById('playBtn');
  const nameInput = document.getElementById('nameInput');
  const serverInput = document.getElementById('serverInput');
  const statusEl = document.getElementById('status');
  const scoreEl = document.getElementById('score');
  const lbList = document.getElementById('lbList');
  const lengthFill = document.getElementById('lengthBarFill');

  let socket = null;
  let myId = null;
  let state = null;
  let camera = { x: 0, y: 0, scale: 1 };
  let mouse = { x: 0, y: 0, down: false };
  let connected = false;
  let playing = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function rand(a,b){ return Math.random()*(b-a)+a; }
  function dist2(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return dx*dx+dy*dy; }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  function setStatus(msg){ statusEl.textContent = msg; }

  function connect() {
    if (socket) { socket.disconnect(); }
    const url = serverInput.value.trim() || 'http://localhost:3000';
    setStatus('Connecting to ' + url + '...');
    playBtn.disabled = true;

    socket = io(url, { transports: ['websocket', 'polling'], reconnection: true });

    socket.on('connect', () => {
      myId = socket.id;
      connected = true;
      setStatus('Connected. Joining game...');
      socket.emit('join', nameInput.value.trim() || 'Snake');
    });

    socket.on('state', (s) => { state = s; });

    socket.on('disconnect', () => {
      connected = false;
      playing = false;
      setStatus('Disconnected from server.');
      playBtn.disabled = false;
    });

    socket.on('connect_error', (err) => {
      setStatus('Connection error: ' + err.message);
      playBtn.disabled = false;
    });

    socket.on('error', (msg) => {
      setStatus('Server error: ' + msg);
      playBtn.disabled = false;
    });
  }

  playBtn.addEventListener('click', () => {
    if (!connected) connect();
    else socket.emit('join', nameInput.value.trim() || 'Snake');
  });

  // Input handlers
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mousedown', () => mouse.down = true);
  window.addEventListener('mouseup', () => mouse.down = false);
  window.addEventListener('touchstart', e => {
    mouse.down = true;
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  }, {passive:false});
  window.addEventListener('touchmove', e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    e.preventDefault();
  }, {passive:false});
  window.addEventListener('touchend', () => mouse.down = false);
  window.addEventListener('keydown', e => { if (e.code === 'Space') mouse.down = true; });
  window.addEventListener('keyup', e => { if (e.code === 'Space') mouse.down = false; });

  function sendInput() {
    if (!connected || !socket) return;
    const cx = canvas.width/2, cy = canvas.height/2;
    const angle = Math.atan2(mouse.y - cy, mouse.x - cx);
    socket.emit('input', { angle, boost: mouse.down });
  }

  function drawSnake(s) {
    if (!s.alive || !s.segments || s.segments.length < 2) return;
    const baseR = s.radius;

    ctx.beginPath();
    ctx.moveTo(s.segments[0].x, s.segments[0].y);
    for (let i = 1; i < s.segments.length; i++) ctx.lineTo(s.segments[i].x, s.segments[i].y);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = baseR * 2;
    ctx.strokeStyle = s.color;
    ctx.stroke();

    ctx.lineWidth = baseR * 1.15;
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.stroke();

    const head = s.segments[0];
    const a = s.angle;
    const perp = a + Math.PI/2;
    const eyeR = baseR * 0.55;
    const eyeDist = baseR * 0.55;
    const eye1 = { x: head.x + Math.cos(a)*eyeDist + Math.cos(perp)*eyeR*0.9, y: head.y + Math.sin(a)*eyeDist + Math.sin(perp)*eyeR*0.9 };
    const eye2 = { x: head.x + Math.cos(a)*eyeDist - Math.cos(perp)*eyeR*0.9, y: head.y + Math.sin(a)*eyeDist - Math.sin(perp)*eyeR*0.9 };
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(eye1.x, eye1.y, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eye2.x, eye2.y, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    const pupilR = eyeR * 0.4;
    ctx.beginPath(); ctx.arc(eye1.x + Math.cos(a)*pupilR*0.6, eye1.y + Math.sin(a)*pupilR*0.6, pupilR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eye2.x + Math.cos(a)*pupilR*0.6, eye2.y + Math.sin(a)*pupilR*0.6, pupilR, 0, Math.PI*2); ctx.fill();

    ctx.font = `bold ${Math.max(12, baseR*0.9)}px 'Segoe UI',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillText(s.name, head.x, head.y - baseR - 5);
    ctx.fillStyle = '#fff';
    ctx.fillText(s.name, head.x, head.y - baseR - 6);
  }

  function updateUI() {
    if (!state) return;
    const me = state.players.find(p => p.id === myId);
    if (me) {
      playing = true;
      overlay.style.display = 'none';
      scoreEl.textContent = 'Length: ' + Math.floor(me.score);
      lengthFill.style.width = Math.min(100, (me.score / 200) * 100) + '%';
    } else {
      playing = false;
      overlay.style.display = 'flex';
      if (connected) setStatus('Waiting to spawn...');
    }

    const board = state.players.slice().sort((a,b) => b.score - a.score).slice(0, 8);
    lbList.innerHTML = board.map((p,i) =>
      `<li style="color:${p.id===myId?'#6be':'#fff'}">${i+1}. ${p.name} — ${Math.floor(p.score)}</li>`
    ).join('');
  }

  function draw() {
    ctx.fillStyle = '#111827';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!state) return;

    const me = state.players.find(p => p.id === myId);
    if (me) {
      camera.x += (me.x - camera.x) * 0.12;
      camera.y += (me.y - camera.y) * 0.12;
      const targetScale = 1 / (1 + Math.log10(Math.max(10, me.score)) * 0.08);
      camera.scale += (targetScale - camera.scale) * 0.05;
    }

    ctx.save();
    const cx = canvas.width/2, cy = canvas.height/2;
    ctx.translate(cx, cy);
    ctx.scale(camera.scale, camera.scale);
    ctx.translate(-camera.x, -camera.y);

    const gridSize = 80;
    const viewW = canvas.width / camera.scale;
    const viewH = canvas.height / camera.scale;
    const startX = Math.floor((camera.x - viewW/2)/gridSize)*gridSize;
    const startY = Math.floor((camera.y - viewH/2)/gridSize)*gridSize;
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = startX; x < camera.x + viewW/2; x += gridSize) { ctx.moveTo(x, camera.y-viewH/2); ctx.lineTo(x, camera.y+viewH/2); }
    for (let y = startY; y < camera.y + viewH/2; y += gridSize) { ctx.moveTo(camera.x-viewW/2, y); ctx.lineTo(camera.x+viewW/2, y); }
    ctx.stroke();

    ctx.strokeStyle = 'rgba(100,180,255,0.25)';
    ctx.lineWidth = 8;
    ctx.strokeRect(-state.world/2, -state.world/2, state.world, state.world);

    if (state.foods) {
      for (const f of state.foods) {
        ctx.fillStyle = f.color;
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    const snakes = state.players.slice().sort((a,b) => a.score - b.score);
    for (const s of snakes) drawSnake(s);

    ctx.restore();
  }

  function loop() {
    sendInput();
    updateUI();
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
